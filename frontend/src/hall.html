<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欢乐渔乐城 - 游戏大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(180deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* 海洋波纹效果 */
        .ocean-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
            z-index: 0;
        }

        /* 气泡效果 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.2), transparent);
            animation: bubbleUp linear infinite;
        }

        @keyframes bubbleUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* 顶部导航 */
        .top-nav {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.3) 100%);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0, 212, 255, 0.5);
            position: relative;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 3px solid rgba(0, 212, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            position: relative;
        }

        .avatar .vip-badge {
            position: absolute;
            bottom: -3px;
            right: -3px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .user-detail h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .user-detail p {
            font-size: 13px;
            color: #00d4ff;
        }

        .asset-bar {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .asset-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gold-icon {
            color: #ffd700;
            font-size: 22px;
        }

        .diamond-icon {
            color: #00bfff;
            font-size: 22px;
        }

        .recharge-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .recharge-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        /* 游戏选择区 */
        .game-section {
            padding: 50px 30px 150px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            margin-bottom: 50px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            border: 2px solid rgba(0, 212, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.6s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            border-color: #00d4ff;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.3);
        }

        .game-icon {
            font-size: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .game-card h3 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
        }

        .game-card p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 15px;
        }

        .game-features {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .feature-tag {
            padding: 6px 12px;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            font-size: 12px;
            color: #00d4ff;
        }

        .enter-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #0077aa 100%);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px;
            border-top: 2px solid rgba(0, 212, 255, 0.5);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 15px;
            border-radius: 15px;
            color: rgba(255, 255, 255, 0.6);
        }

        .nav-item:hover, .nav-item.active {
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .nav-item .icon {
            font-size: 26px;
            margin-bottom: 5px;
        }

        .nav-item p {
            font-size: 12px;
            font-weight: 500;
        }

        /* 提示框 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            z-index: 1000;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .toast.success {
            background: linear-gradient(135deg, #00c853 0%, #00a843 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%);
        }

        .toast.info {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 充值弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a2a4a 0%, #0a1628 100%);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            border: 2px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-size: 28px;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .recharge-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .recharge-option {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .recharge-option:hover, .recharge-option.selected {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .recharge-option .amount {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .recharge-option .diamond {
            font-size: 14px;
            color: #00bfff;
        }

        .close-btn, .confirm-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-right: 10px;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="ocean-bg"></div>
    <div id="bubbles"></div>

    <!-- 顶部导航 -->
    <div class="top-nav">
        <div class="user-info">
            <div class="avatar">
                👤
                <span class="vip-badge" id="vipLevel">VIP1</span>
            </div>
            <div class="user-detail">
                <h3 id="userName">玩家1234</h3>
                <p id="levelText">LV.1</p>
            </div>
        </div>
        <div class="asset-bar">
            <div class="asset-item">
                <span class="gold-icon">💰</span>
                <span id="gold">10000</span>
            </div>
            <div class="asset-item">
                <span class="diamond-icon">💎</span>
                <span id="diamond">100</span>
            </div>
            <button class="recharge-btn" onclick="showRechargeModal()">💎 充值</button>
        </div>
    </div>

    <!-- 游戏选择区 -->
    <div class="game-section">
        <h2 class="section-title">选择游戏</h2>
        <div class="game-grid">
            <div class="game-card" onclick="enterGame('fishing')">
                <div class="game-icon">🎣</div>
                <h3>欢乐捕鱼</h3>
                <p>3大深海场景，千倍爆率，海量金币等你拿</p>
                <div class="game-features">
                    <span class="feature-tag">3D特效</span>
                    <span class="feature-tag">Boss战</span>
                    <span class="feature-tag">组队</span>
                </div>
                <button class="enter-btn">立即进入</button>
            </div>
            <div class="game-card" onclick="enterGame('slot')">
                <div class="game-icon">🎰</div>
                <h3>老虎机</h3>
                <p>多种主题，超高赔率，一键暴富不是梦</p>
                <div class="game-features">
                    <span class="feature-tag">20条线</span>
                    <span class="feature-tag">免费旋转</span>
                    <span class="feature-tag">Bonus游戏</span>
                </div>
                <button class="enter-btn">立即进入</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" data-page="home">
            <div class="icon">🏠</div>
            <p>首页</p>
        </div>
        <div class="nav-item" data-page="mall" onclick="showToast('商城功能开发中...', 'info')">
            <div class="icon">🛒</div>
            <p>商城</p>
        </div>
        <div class="nav-item" data-page="bag" onclick="showToast('背包功能开发中...', 'info')">
            <div class="icon">🎒</div>
            <p>背包</p>
        </div>
        <div class="nav-item" data-page="customer" onclick="showToast('客服功能开发中...', 'info')">
            <div class="icon">💬</div>
            <p>客服</p>
        </div>
        <div class="nav-item" data-page="profile" onclick="logout()">
            <div class="icon">👤</div>
            <p>我的</p>
        </div>
    </div>

    <!-- 充值弹窗 -->
    <div class="modal" id="rechargeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💎 钻石充值</h2>
                <p style="color: rgba(255,255,255,0.7);">选择充值档位</p>
            </div>
            <div class="recharge-options">
                <div class="recharge-option" onclick="selectRecharge(this, 6, 100)">
                    <div class="amount">¥6</div>
                    <div class="diamond">💎 100钻石</div>
                </div>
                <div class="recharge-option" onclick="selectRecharge(this, 30, 500)">
                    <div class="amount">¥30</div>
                    <div class="diamond">💎 500钻石</div>
                </div>
                <div class="recharge-option" onclick="selectRecharge(this, 68, 1000)">
                    <div class="amount">¥68</div>
                    <div class="diamond">💎 1000钻石</div>
                </div>
                <div class="recharge-option" onclick="selectRecharge(this, 128, 2000)">
                    <div class="amount">¥128</div>
                    <div class="diamond">💎 2000钻石</div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="close-btn" onclick="hideRechargeModal()">取消</button>
                <button class="confirm-btn" onclick="confirmRecharge()">确认充值</button>
            </div>
        </div>
    </div>

    <script>
        // 生成气泡背景
        const bubblesContainer = document.getElementById('bubbles');
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.width = Math.random() * 40 + 20 + 'px';
            bubble.style.height = bubble.style.width;
            bubble.style.animationDuration = Math.random() * 10 + 8 + 's';
            bubble.style.animationDelay = Math.random() * 10 + 's';
            bubblesContainer.appendChild(bubble);
        }

        // 显示提示框
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 加载用户信息
        let userInfo = {};
        try {
            userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        } catch (e) {
            console.error('localStorage读取失败:', e);
        }
        document.getElementById('userName').textContent = userInfo.name || '游客';
        document.getElementById('gold').textContent = userInfo.gold || 0;
        document.getElementById('diamond').textContent = userInfo.diamond || 0;
        document.getElementById('vipLevel').textContent = 'VIP' + (userInfo.vip || 0);
        document.getElementById('levelText').textContent = 'LV.' + (userInfo.level || 1);

        // 未登录跳登录
        try {
            if (localStorage.getItem('isLogin') !== 'true') {
                window.location.href = 'login.html';
            }
        } catch (e) {
            console.error('localStorage读取失败:', e);
        }

        // 进入游戏
        function enterGame(type) {
            if (type === 'fishing') {
                window.location.href = 'fishing.html';
            } else if (type === 'slot') {
                window.location.href = 'index.html';
            }
        }

        // 充值弹窗
        let selectedRecharge = null;

        function showRechargeModal() {
            document.getElementById('rechargeModal').classList.add('show');
        }

        function hideRechargeModal() {
            document.getElementById('rechargeModal').classList.remove('show');
            selectedRecharge = null;
        }

        function selectRecharge(element, price, diamond) {
            document.querySelectorAll('.recharge-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedRecharge = { price, diamond };
        }

        function confirmRecharge() {
            if (!selectedRecharge) {
                showToast('请选择充值档位', 'error');
                return;
            }

            showToast('充值功能开发中...', 'info');
            hideRechargeModal();
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                try {
                    localStorage.removeItem('isLogin');
                    localStorage.removeItem('userInfo');
                } catch (e) {
                    console.error('localStorage清除失败:', e);
                }
                showToast('已退出登录', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            }
        }

        // 底部导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.dataset.page;
                if (page === 'home') {
                    document.querySelectorAll('.nav-item').forEach(nav => {
                        nav.classList.remove('active');
                    });
                    this.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
