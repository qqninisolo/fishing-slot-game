<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欢乐渔乐城 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse at top, rgba(0, 212, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(255, 107, 107, 0.2) 0%, transparent 50%),
                linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 气泡背景动画 */
        .bubble-bg {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* 登录容器 */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 45px;
            width: 90%;
            max-width: 450px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.3),
                0 0 100px rgba(0, 212, 255, 0.1);
            animation: slideIn 0.5s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo区域 */
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo h1 {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
        }

        .logo p {
            color: #666;
            font-size: 15px;
            font-weight: 400;
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #fafafa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .input-group input.error {
            border-color: #ff6b6b;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .input-group .error-text {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .input-group input.error + .error-text {
            display: block;
        }

        /* 验证码 */
        .verify-code {
            display: flex;
            gap: 12px;
        }

        .verify-code input {
            flex: 1;
        }

        .verify-btn {
            padding: 14px 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            min-width: 110px;
        }

        .verify-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #0077aa 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* 分隔线 */
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e8e8e8;
        }

        .divider span {
            background: rgba(255, 255, 255, 0.95);
            padding: 0 15px;
            color: #999;
            font-size: 13px;
            position: relative;
        }

        /* 其他登录方式 */
        .other-login {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .login-methods {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .method-item {
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 50%;
            padding: 5px;
            background: rgba(0, 0, 0, 0.05);
        }

        .method-item:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.08);
        }

        .method-item img {
            width: 50px;
            height: 50px;
            display: block;
        }

        /* 游客登录 */
        .guest-login {
            text-align: center;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 12px;
            border: 1px dashed #00d4ff;
        }

        .guest-login a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .guest-login a:hover {
            text-decoration: underline;
        }

        /* 提示框 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 1000;
            animation: slideDown 0.3s ease-out;
            max-width: 90%;
        }

        .toast.success {
            background: linear-gradient(135deg, #00c853 0%, #00a843 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%);
        }

        .toast.info {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 气泡背景 -->
    <div id="bubbles"></div>

    <!-- 登录容器 -->
    <div class="login-container">
        <div class="logo">
            <h1>🎣 欢乐渔乐城</h1>
            <p>捕鱼+老虎机，多重欢乐等你体验</p>
        </div>

        <div class="input-group">
            <label>手机号</label>
            <input type="tel" placeholder="请输入11位手机号" id="phone" maxlength="11">
            <div class="error-text">请输入正确的手机号</div>
        </div>

        <div class="input-group">
            <label>验证码</label>
            <div class="verify-code">
                <input type="text" placeholder="请输入验证码" id="code" maxlength="6">
                <button class="verify-btn" onclick="sendCode()" id="verifyBtn">获取验证码</button>
            </div>
            <div class="error-text">请输入验证码</div>
        </div>

        <button class="login-btn" onclick="login()" id="loginBtn">登录</button>

        <div class="divider">
            <span>其他登录方式</span>
        </div>

        <div class="other-login">
            <div class="method-item" onclick="thirdLogin('wechat')" title="微信登录">
                <img src="https://img.icons8.com/color/96/000000/wechat.png" alt="微信">
            </div>
            <div class="method-item" onclick="thirdLogin('qq')" title="QQ登录">
                <img src="https://img.icons8.com/color/96/000000/qq.png" alt="QQ">
            </div>
        </div>

        <div class="guest-login">
            <a href="javascript:guestLogin()">⚡ 游客快速登录</a>
        </div>
    </div>

    <script>
        // 生成气泡背景
        const bubblesContainer = document.getElementById('bubbles');
        for (let i = 0; i < 20; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble-bg';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.width = Math.random() * 30 + 10 + 'px';
            bubble.style.height = bubble.style.width;
            bubble.style.animationDuration = Math.random() * 10 + 8 + 's';
            bubble.style.animationDelay = Math.random() * 10 + 's';
            bubblesContainer.appendChild(bubble);
        }

        // 显示提示框
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 验证手机号
        function validatePhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        // 发送验证码
        let countdown = 0;
        let countdownTimer = null;

        function sendCode() {
            const phone = document.getElementById('phone').value;

            if (!validatePhone(phone)) {
                document.getElementById('phone').classList.add('error');
                showToast('请输入正确的手机号', 'error');
                return;
            }

            document.getElementById('phone').classList.remove('error');
            const btn = document.getElementById('verifyBtn');

            if (countdown > 0) {
                return;
            }

            showToast('验证码已发送', 'success');

            // 模拟验证码
            btn.disabled = true;
            countdown = 60;
            btn.textContent = `${countdown}秒后重发`;

            countdownTimer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重发`;

                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        }

        // 登录
        function login() {
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;
            const btn = document.getElementById('loginBtn');

            // 验证手机号
            if (!validatePhone(phone)) {
                document.getElementById('phone').classList.add('error');
                showToast('请输入正确的手机号', 'error');
                return;
            }

            // 验证验证码
            if (!code || code.length !== 6) {
                document.getElementById('code').parentElement.querySelector('input').classList.add('error');
                showToast('请输入6位验证码', 'error');
                return;
            }

            // 移除错误状态
            document.getElementById('phone').classList.remove('error');
            document.getElementById('code').parentElement.querySelector('input').classList.remove('error');

            // 显示加载状态
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>登录中...';

            // 模拟登录请求
            setTimeout(() => {
                localStorage.setItem('isLogin', 'true');
                localStorage.setItem('userInfo', JSON.stringify({
                    name: '玩家' + Math.floor(Math.random() * 10000),
                    phone: phone,
                    gold: 10000,
                    diamond: 100,
                    level: 1,
                    vip: 1
                }));

                showToast('登录成功', 'success');

                setTimeout(() => {
                    window.location.href = 'hall.html';
                }, 1000);
            }, 1500);
        }

        // 第三方登录
        function thirdLogin(type) {
            showToast(`${type === 'wechat' ? '微信' : 'QQ'}登录成功`, 'success');

            setTimeout(() => {
                localStorage.setItem('isLogin', 'true');
                localStorage.setItem('userInfo', JSON.stringify({
                    name: `${type === 'wechat' ? '微信' : 'QQ'}用户` + Math.floor(Math.random() * 10000),
                    gold: 15000,
                    diamond: 150,
                    level: 1,
                    vip: 1
                }));

                setTimeout(() => {
                    window.location.href = 'hall.html';
                }, 1000);
            }, 1500);
        }

        // 游客登录
        function guestLogin() {
            showToast('游客登录成功', 'success');

            setTimeout(() => {
                localStorage.setItem('isLogin', 'true');
                localStorage.setItem('userInfo', JSON.stringify({
                    name: '游客' + Math.floor(Math.random() * 10000),
                    gold: 5000,
                    diamond: 50,
                    level: 1,
                    vip: 0,
                    isGuest: true
                }));

                setTimeout(() => {
                    window.location.href = 'hall.html';
                }, 1000);
            }, 1000);
        }

        // 输入框获得焦点时移除错误状态
        document.getElementById('phone').addEventListener('focus', function() {
            this.classList.remove('error');
        });

        document.getElementById('code').addEventListener('focus', function() {
            this.classList.remove('error');
        });

        // 已登录直接跳大厅
        if (localStorage.getItem('isLogin') === 'true') {
            window.location.href = 'hall.html';
        }
    </script>
</body>
</html>
