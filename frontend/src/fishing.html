<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欢乐渔乐城 - 捕鱼游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #001a33 0%, #003366 50%, #004d99 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* 海面效果 */
        .sea-surface {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(180deg, rgba(0, 183, 255, 0.3) 0%, transparent 100%);
            animation: wave 4s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-10px) scaleY(1.1); }
        }

        /* 气泡效果 */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(0, 183, 255, 0.2));
            border-radius: 50%;
            animation: rise 12s linear infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
                transform: scale(1);
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) scale(1.2);
                opacity: 0;
            }
        }

        /* 顶部状态栏 */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.5) 100%);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0, 212, 255, 0.5);
        }

        .back-btn {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.3);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.5);
            transform: scale(1.05);
        }

        .game-info {
            display: flex;
            gap: 20px;
            color: white;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .gold { color: #ffd700; font-size: 18px; }
        .score { color: #00ff88; font-size: 18px; }

        /* 游戏区域 */
        .game-area {
            width: 100%;
            height: calc(100vh - 140px);
            height: calc(100dvh - 140px);
            position: relative;
            margin-top: 50px;
            overflow: hidden;
        }

        /* 鱼类动画 */
        .fish {
            position: absolute;
            font-size: 50px;
            transition: none;
            cursor: crosshair;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            z-index: 10;
        }

        .fish.tiny { font-size: 30px; }
        .fish.small { font-size: 40px; }
        .fish.medium { font-size: 55px; }
        .fish.large { font-size: 75px; }
        .fish.huge { font-size: 90px; }

        .fish.moving-right {
            animation: swimRight linear infinite;
        }

        .fish.moving-left {
            animation: swimLeft linear infinite;
        }

        @keyframes swimRight {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }

        @keyframes swimLeft {
            0% { transform: translateX(calc(100vw + 100px)) scaleX(-1); }
            100% { transform: translateX(-100px) scaleX(-1); }
        }

        .fish.caught {
            animation: caught 0.6s ease-out forwards;
        }

        @keyframes caught {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.5) rotate(360deg); opacity: 0; }
        }

        /* 炮弹效果 */
        .bullet {
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 100%);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.9);
            z-index: 50;
            pointer-events: none;
        }

        /* 爆炸效果 */
        .explosion {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.9) 0%, rgba(255, 140, 0, 0.5) 50%, transparent 100%);
            border-radius: 50%;
            animation: explode 0.6s ease-out forwards;
            z-index: 60;
            pointer-events: none;
        }

        @keyframes explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* 底部控制栏 - 重新设计 */
        .control-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%);
            padding: 12px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-top: 3px solid rgba(0, 212, 255, 0.6);
            backdrop-filter: blur(10px);
        }

        /* 炮台区域 - 重新设计 */
        .cannon-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .multiplier-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 25px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }

        .multiplier-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .multiplier-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }

        .multiplier-btn:active {
            transform: scale(0.95);
        }

        .multiplier-display {
            min-width: 80px;
            text-align: center;
            color: #00d4ff;
            font-size: 20px;
            font-weight: 800;
        }

        /* 炮台 - 重新设计，更大更明显 */
        .cannon-container {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .cannon {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b 0%, #f093fb 50%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.7);
            border: 4px solid rgba(255, 255, 255, 0.3);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
        }

        .cannon::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            opacity: 0.5;
            animation: rotate 4s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 开炮按钮 - 重新设计 */
        .fire-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .fire-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #0077aa 100%);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.3);
            min-width: 120px;
        }

        .fire-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.7);
        }

        .fire-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .fire-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 技能区域 - 重新设计 */
        .skills-section {
            display: flex;
            gap: 12px;
        }

        .skill-btn {
            width: 65px;
            height: 65px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 28px;
            transition: all 0.3s;
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(0, 212, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skill-btn:hover:not(:disabled) {
            transform: scale(1.1);
            border-color: #00d4ff;
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        .skill-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .skill-btn .skill-cost {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(255, 215, 0, 0.9);
            color: black;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 8px;
        }

        /* 自动开炮 */
        .auto-fire {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }

        .auto-switch {
            width: 50px;
            height: 26px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 13px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }

        .auto-switch.active {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }

        .auto-switch::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .auto-switch.active::before {
            left: 27px;
        }

        .auto-label {
            font-size: 11px;
            color: #00d4ff;
            font-weight: 600;
        }

        /* 命中特效文字 */
        .hit-effect {
            position: fixed;
            color: #ffd700;
            font-size: 32px;
            font-weight: 800;
            z-index: 200;
            animation: hitFloat 2s ease-out forwards;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }

        @keyframes hitFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }

        /* 技能效果 */
        .skill-effect {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 150;
        }

        .ice-effect {
            background: radial-gradient(circle, rgba(0, 212, 255, 0.4) 0%, transparent 70%);
            animation: iceFlash 2.5s ease-out forwards;
        }

        @keyframes iceFlash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 提示框 */
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            z-index: 1000;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .toast.success { background: linear-gradient(135deg, #00c853 0%, #00a843 100%); }
        .toast.error { background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%); }
        .toast.info { background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%); }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .status-bar {
                padding: 8px 10px;
            }

            .game-info {
                gap: 12px;
            }

            .info-item {
                font-size: 12px;
            }

            .gold, .score { font-size: 14px; }

            .control-bar {
                padding: 10px 15px 15px;
            }

            .cannon-section {
                gap: 10px;
            }

            .cannon-container {
                width: 80px;
                height: 80px;
            }

            .cannon {
                font-size: 45px;
            }

            .multiplier-btn {
                width: 35px;
                height: 35px;
                font-size: 20px;
            }

            .multiplier-display {
                min-width: 60px;
                font-size: 16px;
            }

            .fire-btn {
                padding: 12px 25px;
                font-size: 15px;
                min-width: 90px;
            }

            .skill-btn {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }

            .auto-switch {
                width: 45px;
                height: 23px;
            }
        }
    </style>
</head>
<body>
    <!-- 海面效果 -->
    <div class="sea-surface"></div>

    <!-- 气泡 -->
    <div id="bubbles"></div>

    <!-- 顶部状态栏 -->
    <div class="status-bar">
        <button class="back-btn" onclick="backToHall()">← 返回</button>
        <div class="game-info">
            <div class="info-item">
                <span>💰</span>
                <span class="gold" id="gold">10000</span>
            </div>
            <div class="info-item">
                <span>⭐</span>
                <span class="score" id="score">0</span>
            </div>
            <div class="info-item">
                <span>💎</span>
                <span class="diamond" id="diamond">100</span>
            </div>
        </div>
    </div>

    <!-- 游戏区域 -->
    <div class="game-area" id="gameArea">
        <!-- 鱼会动态生成 -->
    </div>

    <!-- 底部控制栏 - 重新设计 -->
    <div class="control-bar">
        <!-- 炮台区域 -->
        <div class="cannon-section">
            <div class="multiplier-control">
                <button class="multiplier-btn" onclick="changeMultiplier(10)">−</button>
                <span class="multiplier-display" id="multiplier">×10</span>
                <button class="multiplier-btn" onclick="changeMultiplier(1)">+</button>
            </div>

            <div class="cannon-container">
                <div class="cannon">🎯</div>
            </div>
        </div>

        <!-- 开炮区域 -->
        <div class="fire-section">
            <button class="fire-btn" onclick="fire()">开炮</button>

            <!-- 技能按钮 -->
            <div class="skills-section">
                <button class="skill-btn" id="iceBtn" onclick="useSkill('ice')" title="冰冻技能">
                    ❄️
                    <span class="skill-cost">10💎</span>
                </button>
                <button class="skill-btn" id="bombBtn" onclick="useSkill('bomb')" title="炸弹技能">
                    💣
                    <span class="skill-cost">20💎</span>
                </button>
            </div>

            <!-- 自动开炮 -->
            <div class="auto-fire">
                <div class="auto-switch" onclick="toggleAuto()" id="autoSwitch"></div>
                <span class="auto-label">自动</span>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        let userInfo = {};
        try {
            userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        } catch (e) {
            console.error('localStorage读取失败:', e);
            userInfo = {};
        }
        let gold = userInfo.gold || 10000;
        let diamond = userInfo.diamond || 100;
        let score = 0;
        let multiplier = 10;
        let autoFire = false;
        let autoInterval = null;
        let fishList = [];
        let skillCooldowns = {
            ice: 0,
            bomb: 0
        };

        // 改进的鱼类配置 - 使用更好的emoji
        const fishTypes = [
            { emoji: '🐠', size: 'tiny', reward: 5, speed: 10, probability: 0.35 },
            { emoji: '🐟', size: 'small', reward: 8, speed: 9, probability: 0.30 },
            { emoji: '🐡', size: 'medium', reward: 15, speed: 8, probability: 0.20 },
            { emoji: '🦈', size: 'large', reward: 25, speed: 7, probability: 0.10 },
            { emoji: '🐋', size: 'huge', reward: 50, speed: 6, probability: 0.05 }
        ];

        // 初始化
        document.getElementById('gold').textContent = gold;
        document.getElementById('diamond').textContent = diamond;
        generateBubbles();

        // 生成气泡
        function generateBubbles() {
            const container = document.getElementById('bubbles');
            for (let i = 0; i < 8; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.width = Math.random() * 40 + 25 + 'px';
                bubble.style.height = bubble.style.width;
                bubble.style.animationDuration = Math.random() * 10 + 8 + 's';
                bubble.style.animationDelay = Math.random() * 12 + 's';
                container.appendChild(bubble);
            }
        }

        // 显示提示
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 返回大厅
        function backToHall() {
            if (autoInterval) {
                clearInterval(autoInterval);
            }
            saveUserInfo();
            window.location.href = 'hall.html';
        }

        // 保存用户信息
        function saveUserInfo() {
            userInfo.gold = gold;
            userInfo.diamond = diamond;
            try {
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
            } catch (e) {
                console.error('localStorage写入失败:', e);
            }
        }

        // 调整倍率
        function changeMultiplier(delta) {
            multiplier = Math.max(1, Math.min(100, multiplier + delta));
            document.getElementById('multiplier').textContent = '×' + multiplier;
        }

        // 开炮
        function fire() {
            if (gold < multiplier) {
                showToast('金币不足！', 'error');
                return;
            }

            gold -= multiplier;
            document.getElementById('gold').textContent = gold;

            // 创建炮弹
            createBullet();

            // 检测命中
            setTimeout(() => {
                checkHit();
            }, 500);
        }

        // 创建炮弹
        function createBullet() {
            const bullet = document.createElement('div');
            bullet.className = 'bullet';
            
            const cannon = document.querySelector('.cannon-container');
            const cannonRect = cannon.getBoundingClientRect();
            
            bullet.style.left = (cannonRect.left + cannonRect.width / 2 - 12) + 'px';
            bullet.style.bottom = (window.innerHeight - cannonRect.bottom) + 'px';
            bullet.style.transform = 'translateX(-50%)';
            document.body.appendChild(bullet);

            // 炮弹动画
            let bottom = window.innerHeight - cannonRect.bottom;
            const bulletInterval = setInterval(() => {
                bottom += 18;
                bullet.style.bottom = bottom + 'px';

                if (bottom > window.innerHeight - 140) {
                    clearInterval(bulletInterval);
                    bullet.remove();
                }
            }, 40);
        }

        // 检测命中
        function checkHit() {
            const gameArea = document.getElementById('gameArea');
            const fishes = gameArea.querySelectorAll('.fish:not(.caught)');

            if (fishes.length === 0) return;

            const hitChance = Math.min(0.75, 0.25 + multiplier / 200);

            if (Math.random() < hitChance) {
                const randomFish = fishes[Math.floor(Math.random() * fishes.length)];
                const fishData = fishList.find(f => f.element === randomFish);

                if (fishData) {
                    catchFish(randomFish, fishData);
                }
            }
        }

        // 捕获鱼类
        function catchFish(fishElement, fishData) {
            const rect = fishElement.getBoundingClientRect();
            
            // 创建爆炸效果
            const explosion = document.createElement('div');
            explosion.className = 'explosion';
            explosion.style.left = rect.left + rect.width / 2 - 60 + 'px';
            explosion.style.top = rect.top + rect.height / 2 - 60 + 'px';
            document.body.appendChild(explosion);

            setTimeout(() => explosion.remove(), 600);

            // 鱼被捕获动画
            fishElement.classList.add('caught');
            fishElement.classList.remove('moving-right', 'moving-left');

            // 计算奖励
            const reward = fishData.reward * multiplier;
            gold += reward;
            score += reward;

            document.getElementById('gold').textContent = gold;
            document.getElementById('score').textContent = score;

            // 显示奖励文字
            showHitEffect(rect.left + rect.width / 2, rect.top, reward);

            // 移除鱼
            setTimeout(() => {
                fishElement.remove();
                fishList = fishList.filter(f => f.element !== fishElement);
            }, 600);
        }

        // 显示命中效果
        function showHitEffect(x, y, reward) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = '+' + reward;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 2000);
        }

        // 生成鱼
        function spawnFish() {
            const gameArea = document.getElementById('gameArea');

            const random = Math.random();
            let cumulative = 0;
            let selectedFish = fishTypes[0];

            for (const fish of fishTypes) {
                cumulative += fish.probability;
                if (random < cumulative) {
                    selectedFish = fish;
                    break;
                }
            }

            const fish = document.createElement('div');
            fish.className = `fish ${selectedFish.size}`;
            fish.textContent = selectedFish.emoji;

            const direction = Math.random() > 0.5 ? 'right' : 'left';
            const startY = Math.random() * (gameArea.offsetHeight - 150) + 70;

            fish.style.top = startY + 'px';
            fish.style.animationDuration = selectedFish.speed + 's';

            if (direction === 'right') {
                fish.classList.add('moving-right');
            } else {
                fish.classList.add('moving-left');
            }

            gameArea.appendChild(fish);

            fishList.push({
                element: fish,
                type: selectedFish
            });

            setTimeout(() => {
                if (fish.parentNode) {
                    fish.remove();
                    fishList = fishList.filter(f => f.element !== fish);
                }
            }, selectedFish.speed * 1000);
        }

        // 使用技能
        function useSkill(skillType) {
            const skillCost = skillType === 'ice' ? 10 : 20;

            if (diamond < skillCost) {
                showToast('钻石不足！', 'error');
                return;
            }

            if (skillCooldowns[skillType] > 0) {
                showToast('技能冷却中！', 'info');
                return;
            }

            diamond -= skillCost;
            saveUserInfo();

            if (skillType === 'ice') {
                const effect = document.createElement('div');
                effect.className = 'skill-effect ice-effect';
                document.body.appendChild(effect);

                fishList.forEach(f => {
                    f.element.style.animationPlayState = 'paused';
                });

                setTimeout(() => {
                    effect.remove();
                    fishList.forEach(f => {
                        f.element.style.animationPlayState = 'running';
                    });
                }, 6000);

                skillCooldowns.ice = 35;
                showToast('冰冻技能发动！全场冻结6秒', 'success');
            } else if (skillType === 'bomb') {
                const fishes = document.querySelectorAll('.fish:not(.caught)');
                const caughtCount = Math.min(fishes.length, 6);

                for (let i = 0; i < caughtCount; i++) {
                    const fish = fishes[i];
                    const fishData = fishList.find(f => f.element === fish);
                    if (fishData) {
                        catchFish(fish, fishData);
                    }
                }

                skillCooldowns.bomb = 50;
                showToast('炸弹技能发动！捕获了' + caughtCount + '条鱼', 'success');
            }

            updateSkillButtons();
            startCooldown(skillType);
        }

        // 开始冷却
        function startCooldown(skillType) {
            const btn = document.getElementById(skillType + 'Btn');

            const cooldownInterval = setInterval(() => {
                skillCooldowns[skillType]--;

                if (skillCooldowns[skillType] <= 0) {
                    clearInterval(cooldownInterval);
                    btn.disabled = false;
                } else {
                    btn.disabled = true;
                }
            }, 1000);
        }

        // 更新技能按钮
        function updateSkillButtons() {
        }

        // 切换自动开炮
        function toggleAuto() {
            const switchEl = document.getElementById('autoSwitch');
            autoFire = !autoFire;
            switchEl.classList.toggle('active', autoFire);

            if (autoFire) {
                autoInterval = setInterval(fire, 900);
                showToast('自动开炮已开启', 'info');
            } else {
                if (autoInterval) {
                    clearInterval(autoInterval);
                }
                showToast('自动开炮已关闭', 'info');
            }
        }

        // 定期生成鱼
        setInterval(spawnFish, 2500);

        // 初始生成几条鱼
        for (let i = 0; i < 6; i++) {
            setTimeout(() => spawnFish(), i * 500);
        }

        // 未登录跳转
        try {
            if (localStorage.getItem('isLogin') !== 'true') {
                window.location.href = 'login.html';
            }
        } catch (e) {
            console.error('localStorage读取失败:', e);
        }
    </script>
</body>
</html>
