<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢乐渔乐城 - 捕鱼游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(180deg, #001a33 0%, #003366 50%, #004d99 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
        }
        /* 海面效果 */
        .sea-surface {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(180deg, rgba(0, 183, 255, 0.3) 0%, transparent 100%);
            animation: wave 3s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        /* 气泡效果 */
        .bubble {
            position: absolute;
            bottom: -50px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rise 10s linear infinite;
        }
        @keyframes rise {
            to {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
        .bubble:nth-child(2) { left: 20%; width: 15px; height: 15px; animation-duration: 8s; animation-delay: 1s; }
        .bubble:nth-child(3) { left: 40%; width: 25px; height: 25px; animation-duration: 12s; animation-delay: 2s; }
        .bubble:nth-child(4) { left: 60%; width: 10px; height: 10px; animation-duration: 7s; animation-delay: 3s; }
        .bubble:nth-child(5) { left: 80%; width: 30px; height: 30px; animation-duration: 15s; animation-delay: 4s; }
        /* 顶部状态栏 */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .back-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #00d4ff;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        .game-info {
            display: flex;
            gap: 30px;
            color: white;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gold { color: #ffd700; font-weight: bold; }
        .score { color: #00ff88; font-weight: bold; }
        /* 游戏区域 */
        .game-area {
            width: 100vw;
            height: calc(100vh - 120px);
            position: relative;
            margin-top: 50px;
        }
        /* 鱼类 */
        .fish {
            position: absolute;
            font-size: 40px;
            animation: swim 15s linear infinite;
        }
        @keyframes swim {
            0% { transform: translateX(-100px) rotateY(0); }
            49% { transform: translateX(calc(100vw + 100px)) rotateY(0); }
            50% { transform: translateX(calc(100vw + 100px)) rotateY(180deg); }
            99% { transform: translateX(-100px) rotateY(180deg); }
            100% { transform: translateX(-100px) rotateY(0); }
        }
        .fish.small { font-size: 30px; animation-duration: 10s; }
        .fish.medium { font-size: 50px; animation-duration: 18s; animation-delay: 2s; }
        .fish.big { font-size: 70px; animation-duration: 25s; animation-delay: 5s; }
        .fish:nth-child(1) { top: 20%; left: 0; animation-delay: 0s; }
        .fish:nth-child(2) { top: 35%; left: 0; animation-delay: 3s; }
        .fish:nth-child(3) { top: 50%; left: 0; animation-delay: 1s; }
        .fish:nth-child(4) { top: 65%; left: 0; animation-delay: 4s; }
        .fish:nth-child(5) { top: 80%; left: 0; animation-delay: 2s; }
        /* 底部控制栏 */
        .control-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #00d4ff;
            z-index: 100;
        }
        .cannon-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .cannon {
            font-size: 60px;
            transform: rotate(-90deg);
        }
        .bullet-level {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .level-btn {
            width: 30px;
            height: 30px;
            background: rgba(0, 212, 255, 0.3);
            border: 1px solid #00d4ff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .fire-btn {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff4444 0%, #cc0000 100%);
            border: 3px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .fire-btn:active {
            transform: scale(0.9);
        }
        .auto-fire {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }
        .auto-switch {
            width: 50px;
            height: 25px;
            background: #ccc;
            border-radius: 25px;
            position: relative;
            cursor: pointer;
        }
        .auto-switch.active {
            background: #00d4ff;
        }
        .auto-switch::after {
            content: '';
            position: absolute;
            width: 21px;
            height: 21px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }
        .auto-switch.active::after {
            left: 27px;
        }
    </style>
</head>
<body>
    <div class="sea-surface"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <!-- 顶部状态栏 -->
    <div class="status-bar">
        <button class="back-btn" onclick="backToHall()">← 返回大厅</button>
        <div class="game-info">
            <div class="info-item">
                <span>金币:</span>
                <span class="gold" id="gold">10000</span>
            </div>
            <div class="info-item">
                <span>积分:</span>
                <span class="score" id="score">0</span>
            </div>
            <div class="info-item">
                <span>倍率:</span>
                <span id="multiplier">x10</span>
            </div>
        </div>
    </div>

    <!-- 游戏区域 -->
    <div class="game-area">
        <div class="fish small">🐟</div>
        <div class="fish small">🐠</div>
        <div class="fish medium">🐡</div>
        <div class="fish medium">🦈</div>
        <div class="fish big">🐳</div>
    </div>

    <!-- 底部控制栏 -->
    <div class="control-bar">
        <div class="cannon-area">
            <div class="bullet-level">
                <button class="level-btn" onclick="changeMultiplier(1)">+</button>
                <button class="level-btn" onclick="changeMultiplier(-1)">-</button>
            </div>
            <div class="cannon">🔫</div>
        </div>
        <button class="fire-btn" onclick="fire()">开炮</button>
        <div class="auto-fire">
            <span>自动开炮</span>
            <div class="auto-switch" onclick="toggleAuto()"></div>
        </div>
    </div>

    <script>
        // 加载用户金币
        const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        let gold = userInfo.gold || 10000;
        let score = 0;
        let multiplier = 10;
        let autoFire = false;
        let autoInterval = null;

        document.getElementById('gold').textContent = gold;

        function backToHall() {
            if (autoInterval) clearInterval(autoInterval);
            // 保存金币更新
            userInfo.gold = gold;
            localStorage.setItem('userInfo', JSON.stringify(userInfo));
            window.location.href = 'hall.html';
        }

        function changeMultiplier(delta) {
            multiplier = Math.max(1, Math.min(100, multiplier + delta));
            document.getElementById('multiplier').textContent = 'x' + multiplier;
        }

        function fire() {
            if (gold < multiplier) {
                alert('金币不足！');
                return;
            }
            gold -= multiplier;
            document.getElementById('gold').textContent = gold;

            // 随机命中
            if (Math.random() < 0.3) {
                const reward = multiplier * Math.floor(Math.random() * 20 + 1);
                gold += reward;
                score += reward;
                document.getElementById('gold').textContent = gold;
                document.getElementById('score').textContent = score;
                // 命中效果
                const hitEffect = document.createElement('div');
                hitEffect.textContent = '+' + reward;
                hitEffect.style.position = 'absolute';
                hitEffect.style.left = Math.random() * 80 + 10 + '%';
                hitEffect.style.top = Math.random() * 60 + 20 + '%';
                hitEffect.style.color = '#ffd700';
                hitEffect.style.fontSize = '24px';
                hitEffect.style.fontWeight = 'bold';
                hitEffect.style.zIndex = '50';
                hitEffect.style.animation = 'floatUp 2s forwards';
                document.body.appendChild(hitEffect);
                setTimeout(() => hitEffect.remove(), 2000);
            }
        }

        function toggleAuto() {
            const switchEl = document.querySelector('.auto-switch');
            autoFire = !autoFire;
            switchEl.classList.toggle('active', autoFire);
            
            if (autoFire) {
                autoInterval = setInterval(fire, 500);
            } else {
                if (autoInterval) clearInterval(autoInterval);
            }
        }

        // 添加浮动动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                0% { opacity: 1; transform: translateY(0); }
                100% { opacity: 0; transform: translateY(-50px); }
            }
        `;
        document.head.appendChild(style);

        // 未登录跳登录
        if (localStorage.getItem('isLogin') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
